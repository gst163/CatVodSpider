name: Auto Build Spider Jar

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022       # 稳定版，不跳票
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制Node24，消除警告

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: 执行打包脚本
        run: |
          call gradlew.bat assembleRelease --no-daemon
          call jar\genJar.bat
        shell: cmd

      - name: 提交 Jar
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI 自动更新 Jar"
          add: "jar/*.jar jar/*.md5"
          default_author: github_actions
